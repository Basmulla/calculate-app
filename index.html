<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Calculator App</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="calculator">
    <div class="calculator-grid">
      <div class="output">
        <div class="expression-label">Expression</div>
        <div data-current-operand class="current-operand">0</div>
      </div>

      <button data-all-clear class="danger">AC</button>
      <button data-delete>DEL</button>
      <button data-parenthesis>(</button>
      <button data-parenthesis>)</button>
      <button data-operation>÷</button>

      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button data-operation>×</button>
      <button data-sqrt class="operator">√</button>

      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button data-operation>+</button>
      <button data-operation>-</button>

      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button data-equals class="equals span-two">=</button>

      <button data-number class="span-two">0</button>
      <button data-number>.</button>
      <button data-operation>^</button>
    </div>

    <p class="hint">
      Tip: Press √, then type a number. Example: √(9) = 3.
      You can also use parentheses like (5 + 3) × 2.
    </p>
  </main>
</body>
</html>
